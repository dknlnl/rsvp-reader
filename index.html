<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>闪读 · RSVP 速读器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    /* Solarized Dark */
    --bg: #002b36;
    --bg-raised: #073642;
    --bg-card: #0a3d4a;
    --ink: #93a1a1;
    --ink-dim: #839496;
    --ink-faint: #586e75;
    --accent: #cb4b16;
    --accent-dim: #8f3a14;
    --line: #0e4956;
    --good: #859900;
    --danger: #dc322f;
    --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'SF Mono', 'Cascadia Code', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 800px at 15% -10%, rgba(203,75,22,0.06), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    touch-action:manipulation;
  }
  .app{flex:1;display:flex;flex-direction:column;max-width:960px;margin:0 auto;width:100%;
    padding:0 20px env(safe-area-inset-bottom);}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 0 18px;border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand-mark{
    font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:0.02em;color:var(--ink);
    cursor:pointer; user-select:none;
  }
  .brand-mark span{color:var(--accent);}
  .brand-sub{font-size:11px;color:var(--ink-faint);letter-spacing:0.12em;text-transform:uppercase;}

  .btn{
    appearance:none;border:1px solid var(--line);background:var(--bg-raised);color:var(--ink);
    padding:9px 16px;border-radius:8px;font-size:13.5px;cursor:pointer;font-family:var(--sans);
    transition:border-color .15s, background .15s, transform .1s;
    display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent-dim);background:var(--bg-card);}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fdf6e3;font-weight:600;}
  .btn-primary:hover{background:#e05a20;border-color:#e05a20;}
  .btn-quiet{background:transparent;border-color:transparent;color:var(--ink-dim);}
  .btn-quiet:hover{color:var(--ink);background:var(--bg-raised);}
  .btn-icon{width:38px;height:38px;padding:0;justify-content:center;border-radius:50%;}

  /* ---------- Library view ---------- */
  #view-library{flex:1;padding:28px 0 60px;overflow-y:auto;}
  .lib-empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:90px 20px;color:var(--ink-dim);
    border:1px dashed var(--line);border-radius:16px;margin-top:20px;
  }
  .lib-empty svg{margin-bottom:18px;opacity:0.5;}
  .lib-empty h2{font-family:var(--serif);font-weight:600;color:var(--ink);font-size:20px;margin:0 0 8px;}
  .lib-empty p{margin:0 0 22px;font-size:14px;max-width:340px;line-height:1.6;}

  .lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:22px;}
  .book-card{
    background:var(--bg-card);border:1px solid var(--line);border-radius:12px;
    padding:18px;cursor:pointer;position:relative;transition:border-color .15s, transform .12s;
    display:flex;flex-direction:column;gap:10px;min-height:150px;
  }
  .book-card:hover{border-color:var(--accent-dim);transform:translateY(-2px);}
  .book-spine{width:28px;height:4px;border-radius:2px;background:var(--accent);opacity:0.8;}
  .book-title{font-family:var(--serif);font-size:16.5px;font-weight:600;line-height:1.35;color:var(--ink);
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .book-meta{font-size:12px;color:var(--ink-faint);margin-top:auto;display:flex;justify-content:space-between;align-items:center;}
  .progress-track{height:4px;border-radius:2px;background:var(--line);overflow:hidden;margin-top:4px;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;}
  .book-del{
    position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;
    background:rgba(0,0,0,0.25);border:none;color:var(--ink-faint);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0;transition:opacity .15s;
  }
  .book-card:hover .book-del{opacity:1;}
  .book-del:hover{color:var(--danger);background:rgba(0,0,0,0.4);}

  #file-input{display:none;}
  .paste-panel{
    display:none;margin-top:18px;padding:16px;
    background:var(--bg-card);border:1px solid var(--line);border-radius:12px;
  }
  .paste-panel.active{display:block;}
  .paste-title,.paste-text{
    width:100%;background:var(--bg-raised);border:1px solid var(--line);border-radius:8px;
    color:var(--ink);padding:9px 12px;font-size:16px;font-family:var(--sans);
  }
  .paste-title{margin-bottom:10px;}
  .paste-text{min-height:160px;resize:vertical;line-height:1.6;}
  .paste-title:focus,.paste-text:focus{outline:none;border-color:var(--accent-dim);}
  .paste-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:10px;}
  .upload-status{
    margin-top:18px;padding:14px 16px;border-radius:10px;background:var(--bg-raised);
    border:1px solid var(--line);font-size:13px;color:var(--ink-dim);display:none;
  }
  .upload-status.active{display:block;}

  /* ---------- Reader view ---------- */
  #view-reader{flex:1;display:none;flex-direction:column;padding:0 0 24px;}
  #view-reader.active{display:flex;}
  #view-library.hidden{display:none;}

  .reader-top{display:flex;align-items:center;justify-content:space-between;padding:16px 0;flex-shrink:0;}
  .reader-title{font-family:var(--serif);font-size:14px;color:var(--ink-dim);
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;max-width:400px;}
  .chapter-select{
    background:var(--bg-raised);color:var(--ink-dim);border:1px solid var(--line);border-radius:8px;
    padding:7px 10px;font-size:12.5px;font-family:var(--sans);max-width:220px;
  }

  .stage{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:280px;max-height:640px;width:100%;margin:auto 0;position:relative;
  }
  .orp-guide{position:relative;height:2px;width:100%;max-width:520px;margin-bottom:8px;}
  .orp-guide::before, .orp-guide::after{
    content:'';position:absolute;top:0;width:1px;height:34px;background:var(--line);
  }
  .orp-guide::before{left:50%;transform:translate(-50%,-14px);}
  .orp-guide::after{display:none;}

  .word-display{
    font-family:var(--mono);font-size:clamp(32px,7vw,58px);font-weight:600;letter-spacing:0.01em;
    color:var(--ink);height:80px;display:flex;align-items:center;justify-content:center;
    white-space:pre;
  }
  .word-display .orp-letter{color:var(--accent);}
  .word-display.empty{color:var(--ink-faint);font-size:16px;font-family:var(--sans);font-weight:400;}

  .context-line{
    margin-top:6px;font-size:13px;color:var(--ink-faint);font-family:var(--serif);
    max-width:560px;text-align:center;line-height:1.6;min-height:20px;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
  }

  .progress-wrap{width:100%;max-width:640px;margin:26px auto 0;padding:0 6px;}
  .progress-bar{
    position:relative;height:6px;border-radius:3px;background:var(--line);cursor:pointer;
  }
  .progress-bar-fill{position:absolute;left:0;top:0;height:100%;background:var(--accent);border-radius:3px;}
  .progress-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);margin-top:8px;font-family:var(--mono);}

  .controls{
    display:flex;align-items:center;justify-content:center;gap:18px;margin-top:26px;flex-wrap:wrap;
  }
  .play-btn{
    width:58px;height:58px;border-radius:50%;background:var(--accent);border:none;color:#fdf6e3;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    box-shadow:0 6px 20px rgba(203,75,22,0.25);transition:transform .12s;
  }
  .play-btn:hover{transform:scale(1.05);}
  .play-btn:active{transform:scale(0.95);}
  .play-btn svg{margin-left:3px;}
  .play-btn.playing svg{margin-left:0;}

  .speed-control{display:flex;align-items:center;gap:10px;background:var(--bg-raised);border:1px solid var(--line);
    border-radius:24px;padding:8px 16px;}
  .speed-control button{background:none;border:none;color:var(--ink-dim);font-size:16px;cursor:pointer;width:22px;}
  .speed-control button:hover{color:var(--accent);}
  .speed-val{font-family:var(--mono);font-size:14px;color:var(--ink);min-width:64px;text-align:center;}

  .step-btn{background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:8px;border-radius:8px;}
  .step-btn:hover{color:var(--ink);background:var(--bg-raised);}

  .hint-row{text-align:center;margin-top:22px;font-size:11.5px;color:var(--ink-faint);}
  .hint-row kbd{
    background:var(--bg-raised);border:1px solid var(--line);border-radius:4px;padding:1px 6px;
    font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);
  }

  /* ---------- Sponsor QR ---------- */
  .sponsor-card{
    position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));
    width:max-content;background:var(--bg-card);border:1px solid var(--line);
    border-radius:14px;padding:12px 12px 10px;z-index:50;display:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.42);
  }
  .sponsor-card.show{display:block;}
  .sponsor-cap{font-size:11.5px;color:var(--ink-dim);text-align:center;margin-bottom:8px;line-height:1.4;white-space:nowrap;}
  .sponsor-qr{width:150px;border-radius:8px;display:block;margin:0 auto;}
  .sponsor-close{
    position:absolute;top:-9px;right:-9px;width:24px;height:24px;border-radius:50%;
    background:var(--bg-raised);border:1px solid var(--line);color:var(--ink-dim);
    cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;
  }
  .sponsor-close:hover{color:var(--ink);border-color:var(--accent-dim);}

  @media (max-width:560px){
    .app{padding:0 14px env(safe-area-inset-bottom);}
    .sponsor-card{right:10px;bottom:calc(10px + env(safe-area-inset-bottom));padding:9px 9px 8px;}
    .sponsor-qr{width:104px;}
    .sponsor-cap{font-size:10px;margin-bottom:6px;}
    .brand-sub{display:none;}
    .btn{padding:7px 10px;font-size:12.5px;gap:5px;}
    .word-display{font-size:clamp(26px,10vw,40px);}
    .controls{gap:6px;flex-wrap:nowrap;}
    .speed-control{gap:5px;padding:5px 8px;}
    .speed-control button{width:16px;}
    .speed-val{font-size:11px;min-width:0;}
    .play-btn{width:46px;height:46px;}
    .play-btn svg{width:16px;height:16px;}
    .step-btn{padding:4px;}
    .step-btn svg{width:18px;height:18px;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand" id="brand-home">
      <div class="brand-mark">闪<span>读</span></div>
      <div class="brand-sub">RSVP Reader</div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn" id="btn-paste">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        粘贴文本
      </button>
      <button class="btn" id="btn-upload">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0-12l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        导入文件
      </button>
    </div>
  </div>

  <input type="file" id="file-input" accept=".epub,.txt,.md,.mkd">

  <!-- LIBRARY -->
  <div id="view-library">
    <div class="paste-panel" id="paste-panel">
      <input type="text" id="paste-title" class="paste-title" placeholder="标题">
      <textarea id="paste-text" class="paste-text" placeholder="在这里粘贴或输入文字…"></textarea>
      <div class="paste-actions">
        <button class="btn btn-quiet" id="paste-cancel">取消</button>
        <button class="btn btn-primary" id="paste-save">保存到书架</button>
      </div>
    </div>
    <div class="upload-status" id="upload-status"></div>
    <div id="lib-empty" class="lib-empty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20V4H6.5A2.5 2.5 0 004 6.5v13z"/>
        <path d="M4 19.5V6.5"/>
      </svg>
      <h2>还没有书</h2>
      <p>导入 .epub / .txt / .md 文件,或直接粘贴文字。一次只读一个词,眼睛不动,速度由你定。内容只保存在这台设备的浏览器里。</p>
      <button class="btn btn-primary" id="btn-upload-empty">选择文件</button>
    </div>
    <div id="lib-grid" class="lib-grid"></div>
  </div>

  <!-- READER -->
  <div id="view-reader">
    <div class="reader-top">
      <div class="reader-title" id="reader-title">—</div>
      <select class="chapter-select" id="chapter-select"></select>
    </div>

    <div class="stage">
      <div class="orp-guide"></div>
      <div class="word-display empty" id="word-display">空格键 播放 / 暂停</div>
      <div class="context-line" id="context-line">&nbsp;</div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar">
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>
        <div class="progress-labels">
          <span id="progress-current">0</span>
          <span id="progress-pct">0%</span>
          <span id="progress-total">0</span>
        </div>
      </div>

      <div class="controls">
        <button class="step-btn" id="btn-back" title="上一句">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 19l-7-7 7-7M4 12h17"/></svg>
        </button>

        <div class="speed-control">
          <button id="speed-down">−</button>
          <div class="speed-val" id="speed-val">350 WPM</div>
          <button id="speed-up">+</button>
        </div>

        <div class="speed-control" id="chunk-control" title="每次闪现的字/词数">
          <button id="chunk-down">−</button>
          <div class="speed-val" id="chunk-val">1 字/词</div>
          <button id="chunk-up">+</button>
        </div>

        <button class="play-btn" id="btn-play">
          <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>

        <button class="step-btn" id="btn-fwd" title="下一句">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 5l7 7-7 7M20 12H3"/></svg>
        </button>
      </div>

      <div class="hint-row">
        <kbd>空格</kbd> 播放/暂停 · <kbd>←</kbd><kbd>→</kbd> 前后句 · <kbd>↑</kbd><kbd>↓</kbd> 调速
      </div>
    </div>

    <div class="sponsor-card" id="sponsor-card">
      <button class="sponsor-close" id="sponsor-close" title="关闭" aria-label="关闭">✕</button>

<script>
(function(){
  "use strict";

  /* ============== IndexedDB layer ============== */
  const DB_NAME = "rsvp_library_db";
  const DB_VERSION = 1;
  let dbPromise = null;

  function openDB(){
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("books")){
          db.createObjectStore("books", { keyPath: "id" });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }

  async function dbPut(book){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("books", "readwrite");
      tx.objectStore("books").put(book);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
  async function dbGetAll(){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("books", "readonly");
      const req = tx.objectStore("books").getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }
  async function dbGet(id){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("books", "readonly");
      const req = tx.objectStore("books").get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }
  async function dbDelete(id){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("books", "readwrite");
      tx.objectStore("books").delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  /* ============== EPUB parsing ============== */

  function resolvePath(basePath, relPath){
    if (relPath.startsWith("/")) return relPath.slice(1);
    const baseParts = basePath.split("/").slice(0, -1);
    const relParts = relPath.split("/");
    for (const part of relParts){
      if (part === "." || part === "") continue;
      if (part === ".."){ baseParts.pop(); }
      else { baseParts.push(part); }
    }
    return baseParts.join("/");
  }

  const BLOCK_TAGS = new Set(["P","DIV","BR","LI","H1","H2","H3","H4","H5","H6",
    "SECTION","ARTICLE","TR","TD","TABLE","BLOCKQUOTE","PRE","HR","UL","OL","HEADER","FOOTER"]);

  function stripHtmlToText(htmlString){
    const doc = new DOMParser().parseFromString(htmlString, "text/html");
    // remove script/style
    doc.querySelectorAll("script,style,noscript").forEach(n => n.remove());
    // grab a chapter heading if present: prefer a real heading, fall back to
    // <title>, skipping empty/whitespace-only elements at each step.
    const firstNonEmpty = (nodes) => {
      for (const n of nodes){
        const t = n.textContent.trim().replace(/\s+/g, " ");
        if (t) return t;
      }
      return "";
    };
    const heading =
      firstNonEmpty(doc.querySelectorAll("h1,h2,h3")) ||
      firstNonEmpty(doc.querySelectorAll("title"));

    // Walk the tree inserting separators at block-element boundaries so that
    // e.g. "<h1>Chapter One</h1><p>Hello world.</p>" doesn't collapse into
    // "Chapter OneHello world."
    const root = doc.body || doc.documentElement;
    let text = "";
    const walker = doc.createTreeWalker(root, 0xFFFFFFFF, null);
    let node;
    while ((node = walker.nextNode())){
      if (node.nodeType === 1){ // element
        if (BLOCK_TAGS.has(node.tagName)) text += " ";
      } else if (node.nodeType === 3){ // text
        text += node.textContent;
      }
    }
    return { text: text.replace(/\s+/g, " ").trim(), heading };
  }

  async function parseEpub(arrayBuffer, statusCb){
    statusCb("解压文件…");
    const zip = await JSZip.loadAsync(arrayBuffer);

    const containerXml = await zip.file("META-INF/container.xml").async("text");
    const containerDoc = new DOMParser().parseFromString(containerXml, "application/xml");
    const opfPath = containerDoc.querySelector("rootfile").getAttribute("full-path");

    statusCb("解析目录结构…");
    const opfXml = await zip.file(opfPath).async("text");
    const opfDoc = new DOMParser().parseFromString(opfXml, "application/xml");

    // title / author (namespace-agnostic: dc:title / dc:creator)
    function findByLocalName(root, localName){
      const all = root.getElementsByTagName("*");
      for (let i = 0; i < all.length; i++){
        const el = all[i];
        const ln = el.localName || el.tagName.split(":").pop();
        if (ln.toLowerCase() === localName) return el;
      }
      return null;
    }
    const metadataEl = opfDoc.querySelector("metadata") || opfDoc;
    const titleEl = findByLocalName(metadataEl, "title");
    const title = (titleEl ? titleEl.textContent.trim() : "") || "未命名书籍";
    const authorEl = findByLocalName(metadataEl, "creator");
    const author = authorEl ? authorEl.textContent.trim() : "";

    // manifest: id -> href
    const manifestItems = {};
    opfDoc.querySelectorAll("manifest item").forEach(item => {
      manifestItems[item.getAttribute("id")] = item.getAttribute("href");
    });

    // spine order
    const spineRefs = Array.from(opfDoc.querySelectorAll("spine itemref")).map(el => el.getAttribute("idref"));

    const words = []; // {t: text, c: chapterIndex}
    const chapters = []; // {title, startWordIndex}
    let cjkCount = 0, totalCount = 0;

    let count = 0;
    for (const idref of spineRefs){
      const href = manifestItems[idref];
      if (!href) continue;
      const fullPath = resolvePath(opfPath, href);
      const file = zip.file(fullPath);
      if (!file) continue;
      count++;
      if (count % 3 === 0) statusCb(`正在提取章节 ${count} / ${spineRefs.length}…`);
      let raw;
      try { raw = await file.async("text"); } catch(e){ continue; }
      const { text, heading } = stripHtmlToText(raw);
      if (!text) continue;
      const chapterIndex = chapters.length;
      chapters.push({
        title: heading || `第 ${chapterIndex + 1} 部分`,
        startWordIndex: words.length
      });
      const tokens = tokenizeText(text);
      for (const tk of tokens){
        words.push({ t: tk, c: chapterIndex });
        totalCount++;
        if (isCJKToken(tk)) cjkCount++;
      }
    }

    if (words.length === 0){
      throw new Error("无法从这本 EPUB 中提取到文字内容,文件可能有 DRM 保护或格式特殊。");
    }

    const hasCJK = totalCount > 0 && (cjkCount / totalCount) > 0.15;

    return { title, author, words, chapters, hasCJK };
  }

  /* Plain text (.txt/.md/.mkd or pasted): one chapter, same token stream. */
  function makeBookFromText(title, text){
    const clean = text.replace(/\s+/g, " ").trim();
    if (!clean) throw new Error("没有可读的文字内容。");
    const tokens = tokenizeText(clean);
    if (tokens.length === 0) throw new Error("没有可读的文字内容。");
    let cjkCount = 0;
    const words = tokens.map(tk => {
      if (isCJKToken(tk)) cjkCount++;
      return { t: tk, c: 0 };
    });
    return {
      title: title || "未命名",
      author: "",
      words,
      chapters: [{ title: "全文", startWordIndex: 0 }],
      hasCJK: (cjkCount / words.length) > 0.15,
    };
  }

  /* ---------- Tokenizer ----------
     Latin-script text is whitespace-delimited, so splitting on \s+ works.
     CJK text has no spaces between words, so a naive whitespace split leaves
     an entire sentence as a single "word". Instead, we walk the string and
     emit one token per CJK character (absorbing any immediately-attached
     leading/trailing punctuation), while runs of non-CJK, non-space
     characters are kept together as a single token (normal Latin words). */
  const CJK_RANGE = "\\u4e00-\\u9fff\\u3400-\\u4dbf\\uf900-\\ufaff\\u3040-\\u30ff\\uac00-\\ud7af";
  const LEAD_PUNCT = "[\"'“”‘’「『（《〈(]";
  const TRAIL_PUNCT = "[,，。.!！?？;；:：、\"'“”‘’」』）》〉)…—\\-·]";
  const TOKEN_RE = new RegExp(
    LEAD_PUNCT + "*[" + CJK_RANGE + "]" + TRAIL_PUNCT + "*" +
    "|[^\\s" + CJK_RANGE + "]+",
    "gu"
  );
  const CJK_TEST_RE = new RegExp("[" + CJK_RANGE + "]");

  function tokenizeText(text){
    const out = [];
    let m;
    TOKEN_RE.lastIndex = 0;
    while ((m = TOKEN_RE.exec(text)) !== null){
      if (m[0] && m[0].trim()) out.push(m[0]);
      if (m.index === TOKEN_RE.lastIndex) TOKEN_RE.lastIndex++; // safety against zero-length matches
    }
    return out;
  }

  function isCJKToken(tok){
    return CJK_TEST_RE.test(tok);
  }

  /* Build the on-screen "frame" starting at word index `idx`, grouping up to
     `chunkSize` consecutive bare CJK characters into one flash (a token that
     carries trailing punctuation always ends the frame — a natural pause
     point). Latin word tokens are shown one at a time regardless of
     chunkSize, since they're already whole words. Returns how many tokens
     from the words array the frame consumed, so playback/progress can
     advance correctly. */
  const BARE_CJK_RE = /^[^\s,，。.!！?？;；:：、"'“”‘’」』）》〉)…—\-·]+$/u;

  function buildFrame(words, idx, chunkSize){
    if (idx >= words.length) return { text: "", count: 0 };
    const first = words[idx].t;
    if (chunkSize <= 1 || !isCJKToken(first)){
      return { text: first, count: 1 };
    }
    let text = first;
    let count = 1;
    while (
      count < chunkSize &&
      BARE_CJK_RE.test(words[idx + count - 1].t) &&
      idx + count < words.length &&
      isCJKToken(words[idx + count].t)
    ){
      text += words[idx + count].t;
      count++;
    }
    return { text, count };
  }


  function orpIndex(len){
    if (len <= 1) return 0;
    if (len <= 4) return 1;
    if (len <= 9) return Math.min(2, len - 1);
    if (len <= 13) return 3;
    return 4;
  }

  function renderWordHTML(word){
    if (!word) return "";
    const len = word.length;
    const idx = Math.min(orpIndex(len), len - 1);
    const before = word.slice(0, idx);
    const mid = word[idx];
    const after = word.slice(idx + 1);
    return escapeHtml(before) + '<span class="orp-letter">' + escapeHtml(mid) + '</span>' + escapeHtml(after);
  }
  function escapeHtml(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function delayForWord(word, baseDelayMs){
    let mult = 1;
    const len = word.length;
    if (len > 7) mult += (len - 7) * 0.06;
    if (/[,;:—–，、；：]$/.test(word)) mult += 0.5;
    if (/[.!?。！？]["')\]」』）]?$/.test(word)) mult += 1.2;
    if (/[""“”]/.test(word)) mult += 0.15;
    return baseDelayMs * mult;
  }

  /* ============== App state ============== */

  const state = {
    view: "library",
    books: [],
    current: null,     // full book object {id,title,author,words,chapters,progress,wpm,chunkSize,createdAt}
    playing: false,
    timer: null,
    wpm: 350,
    chunkSize: 1,
  };

  const els = {
    libraryView: document.getElementById("view-library"),
    readerView: document.getElementById("view-reader"),
    libEmpty: document.getElementById("lib-empty"),
    libGrid: document.getElementById("lib-grid"),
    fileInput: document.getElementById("file-input"),
    uploadStatus: document.getElementById("upload-status"),
    readerTitle: document.getElementById("reader-title"),
    chapterSelect: document.getElementById("chapter-select"),
    wordDisplay: document.getElementById("word-display"),
    contextLine: document.getElementById("context-line"),
    progressBar: document.getElementById("progress-bar"),
    progressBarFill: document.getElementById("progress-bar-fill"),
    progressCurrent: document.getElementById("progress-current"),
    progressPct: document.getElementById("progress-pct"),
    progressTotal: document.getElementById("progress-total"),
    playBtn: document.getElementById("btn-play"),
    iconPlay: document.getElementById("icon-play"),
    iconPause: document.getElementById("icon-pause"),
    speedVal: document.getElementById("speed-val"),
    speedUp: document.getElementById("speed-up"),
    speedDown: document.getElementById("speed-down"),
    chunkVal: document.getElementById("chunk-val"),
    chunkUp: document.getElementById("chunk-up"),
    chunkDown: document.getElementById("chunk-down"),
    btnBack: document.getElementById("btn-back"),
    btnFwd: document.getElementById("btn-fwd"),
    sponsorCard: document.getElementById("sponsor-card"),
  };

  /* ---------- Sponsor QR ---------- */
  document.getElementById("sponsor-close").addEventListener("click", () => {
    els.sponsorCard.classList.remove("show");
  });

  /* ---------- View switching ---------- */
  function showLibrary(){
    state.view = "library";
    stopPlayback();
    els.readerView.classList.remove("active");
    els.libraryView.classList.remove("hidden");
    els.sponsorCard.classList.remove("show");
    renderLibrary();
  }
  function showReader(){
    state.view = "reader";
    els.libraryView.classList.add("hidden");
    els.readerView.classList.add("active");
    els.sponsorCard.classList.add("show");
  }

  /* ---------- Library rendering ---------- */
  async function refreshBooksFromDB(){
    state.books = await dbGetAll();
    state.books.sort((a,b) => (b.lastOpened||b.createdAt||0) - (a.lastOpened||a.createdAt||0));
  }

  function renderLibrary(){
    if (state.books.length === 0){
      els.libEmpty.style.display = "flex";
      els.libGrid.innerHTML = "";
      return;
    }
    els.libEmpty.style.display = "none";
    els.libGrid.innerHTML = "";
    for (const book of state.books){
      const total = book.words.length;
      const pct = total ? Math.round((book.progress / total) * 100) : 0;
      const card = document.createElement("div");
      card.className = "book-card";
      card.innerHTML = `
        <div class="book-spine"></div>
        <div class="book-title">${escapeHtml(book.title)}</div>
        <div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="book-meta"><span>${pct}% 已读</span><span>${total.toLocaleString()} 词</span></div>
        <button class="book-del" title="删除">✕</button>
      `;
      card.addEventListener("click", (e) => {
        if (e.target.closest(".book-del")) return;
        openBook(book.id);
      });
      card.querySelector(".book-del").addEventListener("click", async (e) => {
        e.stopPropagation();
        if (confirm(`删除《${book.title}》? 这会清除本地保存的阅读进度。`)){
          await dbDelete(book.id);
          await refreshBooksFromDB();
          renderLibrary();
        }
      });
      els.libGrid.appendChild(card);
    }
  }

  /* ---------- Upload flow ---------- */
  function setUploadStatus(msg, isError){
    els.uploadStatus.textContent = msg;
    els.uploadStatus.style.color = isError ? "var(--danger)" : "var(--ink-dim)";
    els.uploadStatus.classList.toggle("active", !!msg);
  }

  async function saveParsedBook(parsed){
    const book = {
      id: "book_" + Date.now() + "_" + Math.random().toString(36).slice(2,8),
      title: parsed.title,
      author: parsed.author,
      words: parsed.words,
      chapters: parsed.chapters,
      hasCJK: parsed.hasCJK,
      progress: 0,
      wpm: 350,
      chunkSize: parsed.hasCJK ? 2 : 1,
      createdAt: Date.now(),
      lastOpened: Date.now(),
    };
    setUploadStatus("正在保存到本地浏览器…");
    await dbPut(book);
    setUploadStatus(`已导入《${book.title}》,共 ${book.words.length.toLocaleString()} 词。`);
    setTimeout(() => setUploadStatus(""), 3000);
    await refreshBooksFromDB();
    renderLibrary();
  }

  els.fileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadStatus(`正在读取《${file.name}》…`);
    try {
      const ext = (file.name.split(".").pop() || "").toLowerCase();
      let parsed;
      if (ext === "epub"){
        const buf = await file.arrayBuffer();
        parsed = await parseEpub(buf, (msg) => setUploadStatus(msg));
      } else {
        parsed = makeBookFromText(file.name.replace(/\.[^.]+$/, ""), await file.text());
      }
      await saveParsedBook(parsed);
    } catch(err){
      console.error(err);
      setUploadStatus("导入失败: " + (err.message || "未知错误,请确认文件格式正确。"), true);
    } finally {
      els.fileInput.value = "";
    }
  });

  document.getElementById("btn-upload").addEventListener("click", () => els.fileInput.click());
  document.getElementById("btn-upload-empty").addEventListener("click", () => els.fileInput.click());
  document.getElementById("brand-home").addEventListener("click", showLibrary);

  /* ---------- Paste text ---------- */
  const pastePanel = document.getElementById("paste-panel");
  const pasteTitle = document.getElementById("paste-title");
  const pasteText = document.getElementById("paste-text");

  function defaultPasteTitle(){
    const d = new Date();
    const p = (n) => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  document.getElementById("btn-paste").addEventListener("click", () => {
    showLibrary();
    pastePanel.classList.add("active");
    pasteTitle.value = defaultPasteTitle();
    pasteText.focus();
  });
  document.getElementById("paste-cancel").addEventListener("click", () => {
    pastePanel.classList.remove("active");
    pasteText.value = "";
  });
  document.getElementById("paste-save").addEventListener("click", async () => {
    try {
      const parsed = makeBookFromText(pasteTitle.value.trim() || defaultPasteTitle(), pasteText.value);
      await saveParsedBook(parsed);
      pastePanel.classList.remove("active");
      pasteText.value = "";
    } catch(err){
      setUploadStatus("导入失败: " + (err.message || "未知错误"), true);
    }
  });

  /* ---------- Reader ---------- */
  async function openBook(id){
    const book = await dbGet(id);
    if (!book) return;
    book.lastOpened = Date.now();
    await dbPut(book);
    state.current = book;
    state.wpm = book.wpm || 350;
    state.chunkSize = book.chunkSize || (book.hasCJK ? 2 : 1);
    state.playing = false;
    showReader();
    els.readerTitle.textContent = book.title + (book.author ? " · " + book.author : "");
    buildChapterSelect();
    updateSpeedLabel();
    updateChunkLabel();
    renderPosition(book.progress || 0, false);
  }

  function buildChapterSelect(){
    const book = state.current;
    els.chapterSelect.innerHTML = "";
    book.chapters.forEach((ch, i) => {
      const opt = document.createElement("option");
      opt.value = ch.startWordIndex;
      opt.textContent = ch.title;
      els.chapterSelect.appendChild(opt);
    });
  }
  els.chapterSelect.addEventListener("change", () => {
    const idx = parseInt(els.chapterSelect.value, 10);
    stopPlayback();
    renderPosition(idx, false);
  });

  function currentChapterIndexForWord(wordIdx){
    const book = state.current;
    let chIdx = 0;
    for (let i = 0; i < book.chapters.length; i++){
      if (book.chapters[i].startWordIndex <= wordIdx) chIdx = i; else break;
    }
    return chIdx;
  }

  function joinTokensForDisplay(tokens){
    let out = "";
    for (let i = 0; i < tokens.length; i++){
      const tok = tokens[i];
      if (i > 0){
        const prev = tokens[i - 1];
        const prevLast = prev[prev.length - 1] || "";
        const curFirst = tok[0] || "";
        if (!(CJK_TEST_RE.test(prevLast) && CJK_TEST_RE.test(curFirst))) out += " ";
      }
      out += tok;
    }
    return out;
  }

  let currentFrame = { text: "", count: 1 };

  function renderPosition(wordIdx, isPlayingTick){
    const book = state.current;
    const total = book.words.length;
    wordIdx = Math.max(0, Math.min(wordIdx, total - 1));
    book.progress = wordIdx;

    currentFrame = buildFrame(book.words, wordIdx, state.chunkSize);
    els.wordDisplay.classList.remove("empty");
    els.wordDisplay.innerHTML = renderWordHTML(currentFrame.text);

    // context line: a few tokens around the current frame
    const start = Math.max(0, wordIdx - 4);
    const end = Math.min(total, wordIdx + currentFrame.count + 4);
    const ctxTokens = book.words.slice(start, end).map(w => w.t);
    els.contextLine.textContent = joinTokensForDisplay(ctxTokens);

    // chapter select sync
    const chIdx = currentChapterIndexForWord(wordIdx);
    if (els.chapterSelect.selectedIndex !== chIdx){
      els.chapterSelect.selectedIndex = chIdx;
    }

    const pct = total > 1 ? (wordIdx / (total - 1)) * 100 : 0;
    els.progressBarFill.style.width = pct + "%";
    els.progressCurrent.textContent = (wordIdx + 1).toLocaleString();
    els.progressTotal.textContent = total.toLocaleString();
    els.progressPct.textContent = Math.round(pct) + "%";

    if (!isPlayingTick){
      persistProgress();
    }
  }

  let persistTimer = null;
  function persistProgress(){
    clearTimeout(persistTimer);
    persistTimer = setTimeout(() => {
      if (state.current) dbPut(state.current);
    }, 400);
  }

  function tick(){
    const book = state.current;
    if (!book) return;
    const advance = currentFrame.count || 1;
    const nextIdx = book.progress + advance;
    if (nextIdx >= book.words.length){
      stopPlayback();
      renderPosition(book.words.length - 1, false);
      return;
    }
    renderPosition(nextIdx, true);
    const baseDelay = 60000 / state.wpm;
    const delay = delayForWord(currentFrame.text, baseDelay);
    state.timer = setTimeout(tick, delay);
  }

  function startPlayback(){
    if (!state.current) return;
    if (state.current.progress >= state.current.words.length - 1){
      renderPosition(0, false);
    } else {
      // re-render at the current position in case chunkSize changed while paused
      renderPosition(state.current.progress, false);
    }
    state.playing = true;
    els.iconPlay.style.display = "none";
    els.iconPause.style.display = "block";
    const baseDelay = 60000 / state.wpm;
    state.timer = setTimeout(tick, delayForWord(currentFrame.text, baseDelay));
  }
  function stopPlayback(){
    state.playing = false;
    clearTimeout(state.timer);
    els.iconPlay.style.display = "block";
    els.iconPause.style.display = "none";
    if (state.current) persistProgress();
  }
  function togglePlayback(){
    if (state.playing) stopPlayback(); else startPlayback();
  }

  els.playBtn.addEventListener("click", togglePlayback);

  function updateSpeedLabel(){
    els.speedVal.textContent = state.wpm + " WPM";
    if (state.current){
      state.current.wpm = state.wpm;
      persistProgress();
    }
  }
  els.speedUp.addEventListener("click", () => { state.wpm = Math.min(1000, state.wpm + 25); updateSpeedLabel(); });
  els.speedDown.addEventListener("click", () => { state.wpm = Math.max(100, state.wpm - 25); updateSpeedLabel(); });

  function updateChunkLabel(){
    els.chunkVal.textContent = state.chunkSize + " 字/词";
    if (state.current){
      state.current.chunkSize = state.chunkSize;
      persistProgress();
      if (!state.playing) renderPosition(state.current.progress, false);
    }
  }
  els.chunkUp.addEventListener("click", () => { state.chunkSize = Math.min(4, state.chunkSize + 1); updateChunkLabel(); });
  els.chunkDown.addEventListener("click", () => { state.chunkSize = Math.max(1, state.chunkSize - 1); updateChunkLabel(); });

  function jumpBySentence(dir){
    const book = state.current;
    if (!book) return;
    let idx = book.progress;
    idx += dir;
    // walk to next sentence boundary in that direction
    while (idx > 0 && idx < book.words.length - 1){
      const prevWord = book.words[idx - (dir > 0 ? 1 : 0)];
      if (prevWord && /[.!?。！？]["')\]」』）]?$/.test(prevWord.t)) break;
      idx += dir;
    }
    renderPosition(idx, false);
  }
  els.btnBack.addEventListener("click", () => jumpBySentence(-1));
  els.btnFwd.addEventListener("click", () => jumpBySentence(1));

  els.progressBar.addEventListener("click", (e) => {
    const book = state.current;
    if (!book) return;
    const rect = els.progressBar.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    stopPlayback();
    renderPosition(Math.round(ratio * (book.words.length - 1)), false);
  });

  document.addEventListener("keydown", (e) => {
    if (state.view !== "reader") return;
    if (e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
    switch(e.code){
      case "Space": e.preventDefault(); togglePlayback(); break;
      case "ArrowLeft": e.preventDefault(); stopPlayback(); jumpBySentence(-1); break;
      case "ArrowRight": e.preventDefault(); stopPlayback(); jumpBySentence(1); break;
      case "ArrowUp": e.preventDefault(); state.wpm = Math.min(1000, state.wpm + 25); updateSpeedLabel(); break;
      case "ArrowDown": e.preventDefault(); state.wpm = Math.max(100, state.wpm - 25); updateSpeedLabel(); break;
      case "Escape": showLibrary(); break;
    }
  });

  /* ---------- Init ---------- */
  (async function init(){
    await refreshBooksFromDB();
    renderLibrary();
  })();

})();
</script>
</body>
</html>
