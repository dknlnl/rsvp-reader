<body>
<div class="app">

  <div class="topbar">
    <div class="brand" id="brand-home">
      <div class="brand-mark">闪<span>读</span></div>
      <div class="brand-sub">RSVP Reader</div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn" id="btn-paste">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        粘贴文本
      </button>
      <button class="btn" id="btn-upload">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0-12l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        导入文件
      </button>
    </div>
  </div>

  <input type="file" id="file-input" accept=".epub,.txt,.md,.mkd">

  <!-- LIBRARY -->
  <div id="view-library">
    <div class="paste-panel" id="paste-panel">
      <input type="text" id="paste-title" class="paste-title" placeholder="标题">
      <textarea id="paste-text" class="paste-text" placeholder="在这里粘贴或输入文字…"></textarea>
      <div class="paste-actions">
        <button class="btn btn-quiet" id="paste-cancel">取消</button>
        <button class="btn btn-primary" id="paste-save">保存到书架</button>
      </div>
    </div>
    <div class="upload-status" id="upload-status"></div>
    <div id="lib-empty" class="lib-empty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20V4H6.5A2.5 2.5 0 004 6.5v13z"/>
        <path d="M4 19.5V6.5"/>
      </svg>
      <h2>还没有书</h2>
      <p>导入 .epub / .txt / .md 文件,或直接粘贴文字。一次只读一个词,眼睛不动,速度由你定。内容只保存在这台设备的浏览器里。</p>
      <button class="btn btn-primary" id="btn-upload-empty">选择文件</button>
    </div>
    <div id="lib-grid" class="lib-grid"></div>
  </div>

  <!-- READER -->
  <div id="view-reader">
    <div class="reader-top">
      <div class="reader-title" id="reader-title">—</div>
      <select class="chapter-select" id="chapter-select"></select>
    </div>

    <div class="stage">
      <div class="orp-guide"></div>
      <div class="word-display empty" id="word-display">空格键 播放 / 暂停</div>
      <div class="context-line" id="context-line">&nbsp;</div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar">
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>
        <div class="progress-labels">
          <span id="progress-current">0</span>
          <span id="progress-pct">0%</span>
          <span id="progress-total">0</span>
        </div>
      </div>

      <div class="controls">
        <button class="step-btn" id="btn-back" title="上一句">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 19l-7-7 7-7M4 12h17"/></svg>
        </button>

        <div class="speed-control">
          <button id="speed-down">−</button>
          <div class="speed-val" id="speed-val">350 WPM</div>
          <button id="speed-up">+</button>
        </div>

        <div class="speed-control" id="chunk-control" title="每次闪现的字/词数">
          <button id="chunk-down">−</button>
          <div class="speed-val" id="chunk-val">1 字/词</div>
          <button id="chunk-up">+</button>
        </div>

        <button class="play-btn" id="btn-play">
          <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>

        <button class="step-btn" id="btn-fwd" title="下一句">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 5l7 7-7 7M20 12H3"/></svg>
        </button>
      </div>

      <div class="hint-row">
        <kbd>空格</kbd> 播放/暂停 · <kbd>←</kbd><kbd>→</kbd> 前后句 · <kbd>↑</kbd><kbd>↓</kbd> 调速
      </div>
    </div>

    <div class="sponsor-card" id="sponsor-card">
      <button class="sponsor-close" id="sponsor-close" title="关闭" aria-label="关闭">✕</button>
      <div class="sponsor-cap">作者失业了,给他俩馒头?</div>
