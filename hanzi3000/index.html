  <style rel="stylesheet" crossorigin>:root{--bg: #002b36;--bg-raised: #073642;--bg-card: #0a3d4a;--ink: #93a1a1;--ink-dim: #839496;--ink-faint: #586e75;--accent: #cb4b16;--accent-dim: #8f3a14;--line: #0e4956;--good: #859900;--danger: #dc322f;--serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;--sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;--mono: "SF Mono", "Cascadia Code", Consolas, monospace;--han: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", var(--sans)}*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%}body{background:radial-gradient(1200px 800px at 15% -10%,rgba(203,75,22,.06),transparent 60%),var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;touch-action:manipulation}.app{flex:1;display:flex;flex-direction:column;max-width:640px;margin:0 auto;width:100%;padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom)}.topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 0 18px;border-bottom:1px solid var(--line);flex-shrink:0}.brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;user-select:none}.brand-mark{font-family:var(--han);font-size:22px;font-weight:600;letter-spacing:.04em;color:var(--ink)}.brand-mark span{color:var(--accent)}.brand-ver{font-family:var(--mono);font-size:10px;color:var(--ink-faint);opacity:.7}.brand-sub{font-family:var(--serif);font-size:13px;color:var(--ink-faint);letter-spacing:.05em}.btn{appearance:none;border:1px solid var(--line);background:var(--bg-raised);color:var(--ink);padding:11px 18px;border-radius:9px;font-size:14px;cursor:pointer;font-family:var(--sans);transition:border-color .15s,background .15s,transform .1s;display:inline-flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap}.btn:hover{border-color:var(--accent-dim);background:var(--bg-card)}.btn:active{transform:scale(.97)}.btn-primary{background:var(--acce <body>
<div class="app">

  <div class="topbar">
    <div class="brand" id="brand-home">
      <div class="brand-mark">常用<span>字</span></div>
      <span class="brand-ver" id="app-version"></span>
    </div>
    <div class="brand-sub">Hanzi 3000</div>
  </div>

  <!-- HOME -->
  <div id="view-home" class="view">
    <div class="home-panel">
      <div class="progress-num"><span id="home-count">0</span><span class="progress-slash">/</span><span id="home-total">0</span></div>
      <div class="progress-label">characters learned</div>
      <div class="progress-track"><div class="progress-fill" id="home-bar"></div></div>
      <p class="blurb">Learn the most common Chinese characters by seeing them inside plain English sentences.</p>
      <button class="btn btn-primary btn-start" id="btn-start">Start</button>
      <button class="btn btn-quiet" id="btn-reset">Reset progress</button>
    </div>
  </div>

  <!-- STUDY -->
  <div id="view-study" class="view">
    <div class="study-hud">
      <div class="hud-progress" id="study-progress">0 / 0</div>
      <button class="btn btn-quiet" id="btn-quit">Home</button>
    </div>

    <div class="card-wrap">
      <div class="card" id="card">
        <div class="sentence" id="sentence"></div>
        <div class="reveal" id="reveal">
          <div class="reveal-head">
            <span class="reveal-word" id="reveal-word"></span>
            <span class="reveal-pinyin" id="reveal-pinyin"></span>
          </div>
          <div class="reveal-gloss" id="reveal-gloss"></div>
          <div class="reveal-breakdown" id="reveal-breakdown"></div>
        </div>
        <div class="tap-hint">tap the character to reveal</div>
      </div>
    </div>

    <div class="study-actions">
      <button class="btn btn-reveal" id="btn-reveal">Reveal</button>
      <button class="btn btn-again" id="btn-again">Again</button>
      <button class="btn btn-primary btn-learned" id="btn-learned">Got it ✓</button>
    </div>
  </div>

  <!-- DONE -->
  <div id="view-done" class="view">
    <div class="done-panel">
      <div class="done-title">All caught up 🎉</div>
      <div class="done-sub">You've learned <span id="done-count">0</span> characters.</div>
      <button class="btn btn-primary" id="btn-done-home">Home</button>
    </div>
  </div>

</div>
</body>
</html>
