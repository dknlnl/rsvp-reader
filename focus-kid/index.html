<body>
<div class="app">

  <div class="topbar">
    <div class="brand" id="brand-home">
      <div class="brand-mark">专注<span>方格</span></div>
      <span class="brand-ver" id="app-version"></span>
    </div>
  </div>

  <!-- HOME -->
  <div id="view-home" class="view">
    <div class="home-panel">
      <div class="field-label">格子尺寸</div>
      <div class="size-picker" id="size-picker">
        <button class="size-btn" data-size="3">3×3</button>
        <button class="size-btn" data-size="4">4×4</button>
        <button class="size-btn" data-size="5">5×5</button>
        <button class="size-btn" data-size="6">6×6</button>
        <button class="size-btn" data-size="7">7×7</button>
      </div>

      <label class="toggle-row" for="center-dot-toggle">
        <span>中心注视点(用余光找数字)</span>
        <input type="checkbox" id="center-dot-toggle">
      </label>

      <div class="best-time" id="best-time">暂无记录</div>

      <button class="btn btn-primary btn-start" id="btn-start">开始</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="view-game" class="view">
    <div class="game-hud">
      <div class="hud-timer" id="hud-timer">0.0秒</div>
      <div class="hud-progress" id="hud-progress">找 1</div>
      <button class="btn btn-quiet" id="btn-quit">退出</button>
    </div>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
      <div class="center-dot" id="center-dot"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="view-result" class="view">
    <div class="result-panel">
      <div class="result-title" id="result-title">完成!</div>
      <div class="result-time" id="result-time">0.0秒</div>
      <div class="result-record" id="result-record"></div>
      <div class="result-actions">
        <button class="btn btn-primary" id="btn-replay">再来一局</button>
        <button class="btn btn-quiet" id="btn-change-size">换尺寸</button>
      </div>
    </div>
  </div>

</div>
</body>
</html>
